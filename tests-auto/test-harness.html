<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Note - Test Harness</title>
    <link rel="stylesheet" href="../extension/sidepanel.css">
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const locale = urlParams.get('locale') || 'zh_CN';
      const SESSION_STORAGE_KEY = '__side_note_test_session__';

      function readSessionData() {
        try {
          return JSON.parse(sessionStorage.getItem(SESSION_STORAGE_KEY) || '{}');
        } catch (error) {
          return {};
        }
      }

      function writeSessionData(data) {
        sessionStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(data));
      }
      const messages = {
        zh_CN: {
          app_name: 'Side Note',
          ui_theme_toggle: '切换主题',
          ui_copy: '复制',
          ui_copy_all_content: '复制全部内容',
          ui_close: '关闭',
          ui_close_panel: '关闭面板',
          ui_meta_url: '网页链接',
          ui_meta_title: '网页标题',
          ui_meta_created: '创建时间',
          ui_editor_content: '笔记内容',
          ui_empty_title: '还没有内容',
          ui_empty_desc: '在右侧开始记录你的灵感',
          msg_empty_fallback: '未获取到哦，可手动输入',
          toast_copy_success: '复制完成啦',
          toast_copy_error: '复制失败咯，请重试',
          toast_save_error: '保存失败，请重试后再关闭'
        },
        en: {
          app_name: 'Side Note',
          ui_theme_toggle: 'Switch theme',
          ui_copy: 'Copy',
          ui_copy_all_content: 'Copy all content',
          ui_close: 'Close',
          ui_close_panel: 'Close panel',
          ui_meta_url: 'Page URL',
          ui_meta_title: 'Page title',
          ui_meta_created: 'Created at',
          ui_editor_content: 'Note content',
          ui_empty_title: 'No content yet',
          ui_empty_desc: 'Start capturing your ideas on the right',
          msg_empty_fallback: 'Not available yet, you can enter it manually',
          toast_copy_success: 'Copied successfully',
          toast_copy_error: 'Copy failed, please try again',
          toast_save_error: 'Save failed. Please retry before closing'
        }
      };

      // Mock Chrome Extension APIs for testing
      window.chrome = {
        i18n: {
          getMessage: function(key) {
            return messages[locale]?.[key] || '';
          },
          getUILanguage: function() {
            return locale === 'en' ? 'en-US' : 'zh-CN';
          }
        },
        storage: {
          onChanged: {
            _listeners: [],
            addListener: function(listener) {
              this._listeners.push(listener);
            }
          },
          session: {
            _data: readSessionData(),
            _getCallCount: 0,
            _emitChanged: function(changes) {
              for (const listener of chrome.storage.onChanged._listeners) {
                try {
                  listener(changes, 'session');
                } catch (error) {
                  // ignore listener errors in harness
                }
              }
            },
            get: async function(keys) {
              this._getCallCount += 1;
              if (keys === null) return this._data;
              if (typeof keys === 'string') {
                const result = { [keys]: this._data[keys] };
                // 在最后一次读取的快照生成后立即模拟 background 写入，
                // 用于验证面板必须先注册监听器，不得丢失该变更事件。
                if (urlParams.get('simulateInitRace') === '1' && this._getCallCount === 3) {
                  const raceTabId = Number(urlParams.get('tabId'));
                  const raceNote = {
                    tabId: raceTabId,
                    url: 'https://www.bilibili.com/video/BV1race',
                    title: '初始化竞态中的真实标题',
                    createdAt: '2026-07-15 09:00:00',
                    contentMd: '',
                    updatedAt: '2026-07-15 09:00:00'
                  };
                  this._data[keys] = raceNote;
                  writeSessionData(this._data);
                  this._emitChanged({
                    [keys]: { oldValue: undefined, newValue: raceNote }
                  });
                }
                return result;
              }
              const result = {};
              for (const k of keys) {
                result[k] = this._data[k];
              }
              return result;
            },
            set: async function(items) {
              const changes = {};
              for (const [key, value] of Object.entries(items)) {
                changes[key] = { oldValue: this._data[key], newValue: value };
                this._data[key] = value;
              }
              writeSessionData(this._data);
              this._emitChanged(changes);
            },
            remove: async function(keys) {
              const list = typeof keys === 'string' ? [keys] : keys;
              const changes = {};
              for (const key of list) {
                changes[key] = { oldValue: this._data[key], newValue: undefined };
                delete this._data[key];
              }
              writeSessionData(this._data);
              this._emitChanged(changes);
            }
          },
          local: {
            _data: { theme: 'auto' },
            _emitChanged: function(changes) {
              for (const listener of chrome.storage.onChanged._listeners) {
                try {
                  listener(changes, 'local');
                } catch (error) {
                  // ignore listener errors in harness
                }
              }
            },
            get: async function(keys) {
              if (keys === null) return this._data;
              if (typeof keys === 'string') {
                return { [keys]: this._data[keys] };
              }
              const result = {};
              for (const k of keys) {
                result[k] = this._data[k];
              }
              return result;
            },
            set: async function(items) {
              const changes = {};
              for (const [key, value] of Object.entries(items)) {
                changes[key] = { oldValue: this._data[key], newValue: value };
                this._data[key] = value;
              }
              this._emitChanged(changes);
            }
          }
        },
        runtime: {
          connect: function() {
            return {
              postMessage: function() {},
              onDisconnect: { addListener: function() {} }
            };
          },
          sendMessage: function() {}
        },
        sidePanel: {
          _closeCalls: [],
          close: async function(options) {
            this._closeCalls.push(options);
          }
        }
      };

      // Pre-populate test data
      const tabId = urlParams.get('tabId') || '12345';
      const noteKey = `note:${tabId}`;
      
      if (urlParams.get('simulateInitRace') !== '1' && !chrome.storage.session._data[noteKey]) {
        chrome.storage.session._data[noteKey] = {
          tabId: parseInt(tabId),
          url: 'https://example.com/test-page',
          title: 'Test Page Title',
          createdAt: '2026-01-26 12:00:00',
          contentMd: '',
          updatedAt: '2026-01-26 12:00:00'
        };
        writeSessionData(chrome.storage.session._data);
      }
    </script>
  </head>
  <body>
    <div class="panel" id="sidePanel">
      <header class="header">
        <div class="logo-area">
          <span class="app-name" id="appName">Side Note</span>
        </div>
        <div class="actions">
          <button class="icon-btn" id="themeToggle" title="切换主题" aria-label="切换主题">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="sun-icon" aria-hidden="true">
              <path
                d="M12 3V4M12 20V21M4 12H3M21 12H20M5.636 5.636L6.343 6.343M17.657 17.657L18.364 18.364M5.636 18.364L6.343 17.657M17.657 6.343L18.364 5.636M16 12C16 14.2091 14.2091 16 12 16C9.79086 16 8 14.2091 8 12C8 9.79086 9.79086 8 12 8C14.2091 8 16 9.79086 16 12Z"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
            </svg>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="moon-icon" aria-hidden="true">
              <path
                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
            </svg>
          </button>
          <button class="icon-btn" id="copyBtn" title="复制" aria-label="复制全部内容">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"
              />
              <path
                d="M5 15H4C2.89543 15 2 14.1046 2 13V4C2 2.89543 2.89543 2 4 2H13C14.1046 2 15 2.89543 15 4V5"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
            </svg>
          </button>
          <button class="icon-btn" id="closeBtn" title="关闭" aria-label="关闭面板">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M18 6L6 18M6 6L18 18"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </header>

      <section class="metadata">
        <label class="meta-row">
          <span class="meta-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path
                d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 0 1 7 7l-1 1"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
              <path
                d="M14 11a5 5 0 0 1 0 7l-1 1a5 5 0 0 1-7-7l1-1"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
            </svg>
          </span>
          <input class="meta-input" id="metaUrl" type="text" spellcheck="false" aria-label="网页链接">
        </label>
        <label class="meta-row">
          <span class="meta-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
              <path
                d="M14 2v6h6"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
              <path
                d="M16 13H8"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
              <path
                d="M16 17H8"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
            </svg>
          </span>
          <input class="meta-input" id="metaTitle" type="text" spellcheck="false" aria-label="网页标题">
        </label>
        <label class="meta-row">
          <span class="meta-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <rect
                x="3" y="4" width="18" height="18" rx="2" ry="2"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
              <path
                d="M16 2v4M8 2v4M3 10h18"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              />
            </svg>
          </span>
          <input class="meta-input" id="metaCreated" type="text" spellcheck="false" aria-label="创建时间">
        </label>
      </section>

      <section class="editor">
        <div class="editor-surface">
          <div class="empty-state" id="emptyState" aria-hidden="true">
            <div class="empty-icon" aria-hidden="true">✦</div>
            <div class="empty-title" id="emptyTitle">还没有内容</div>
            <div class="empty-desc" id="emptyDesc">在右侧开始记录你的灵感</div>
          </div>
          <div class="editor-root" id="editor" aria-label="笔记内容"></div>
        </div>
      </section>

      <div id="toast" class="toast">复制完成啦</div>
    </div>

    <script src="../extension/sidepanel.js"></script>
  </body>
</html>
